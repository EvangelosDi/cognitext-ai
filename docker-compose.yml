services:

  backend:
    build:
      context: ./backend
    container_name: cognitext-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16

    container_name: cognitext-db

    environment:
      POSTGRES_USER: cognitext_user
      POSTGRES_PASSWORD: cognitext_password
      POSTGRES_DB: cognitext_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: